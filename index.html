<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NB Asesoría Financiera — Cuestionario de perfil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:#F4F6F9;color:#1A1A2E;font-size:14px;min-height:100vh}

.header{background:#0D3D6B;padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.header-logo{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:#fff;letter-spacing:-.3px}
.header-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.header-badge{font-size:10px;padding:4px 10px;border-radius:99px;background:rgba(255,255,255,.15);color:#fff;border:.5px solid rgba(255,255,255,.3)}

.container{max-width:600px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* PROGRESS */
.progress-wrap{margin-bottom:1.5rem}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#9BA8BB;margin-bottom:6px}
.progress-bar{height:4px;background:#E8ECF2;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#185FA5;border-radius:2px;transition:width .4s ease}
.step-dots{display:flex;gap:6px;margin-top:8px;justify-content:center}
.step-dot{width:28px;height:4px;border-radius:2px;background:#E8ECF2;transition:background .3s ease}
.step-dot.done{background:#185FA5}
.step-dot.active{background:#27500A}

/* STEP CARD */
.step-card{background:#fff;border-radius:14px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:1rem;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-num{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9BA8BB;margin-bottom:6px}
.step-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-.4px;color:#0D3D6B;margin-bottom:6px}
.step-desc{font-size:13px;color:#9BA8BB;line-height:1.6;margin-bottom:1.25rem}

/* FIELDS */
.field{margin-bottom:1rem}
.field label{font-size:11px;color:#9BA8BB;display:block;margin-bottom:5px;letter-spacing:.3px}
.field input,.field select{width:100%;background:#F4F6F9;border:1.5px solid #E8ECF2;border-radius:8px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:13px;color:#1A1A2E;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:#185FA5}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:.5rem}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1.5px solid #E8ECF2;border-radius:10px;cursor:pointer;transition:all .15s;background:#F4F6F9}
.opt:hover{border-color:#185FA5;background:#F0F6FF}
.opt.sel{background:#0D3D6B;border-color:#0D3D6B}
.opt-circle{width:18px;height:18px;border-radius:50%;border:2px solid #9BA8BB;flex-shrink:0;margin-top:2px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.opt.sel .opt-circle{border-color:#fff;background:#fff}
.opt.sel .opt-circle::after{content:'';width:8px;height:8px;border-radius:50%;background:#0D3D6B;display:block}
.opt-main{font-size:13px;font-weight:500;color:#1A1A2E;line-height:1.4}
.opt.sel .opt-main{color:#fff}
.opt-sub{font-size:11px;color:#9BA8BB;margin-top:2px;line-height:1.4}
.opt.sel .opt-sub{color:rgba(255,255,255,.7)}

/* Q LABEL */
.q-label{font-size:13px;font-weight:500;color:#1A1A2E;margin-bottom:.75rem;line-height:1.5}
.q-hint{font-size:11px;color:#9BA8BB;margin-bottom:.75rem;padding:8px 12px;background:#F4F6F9;border-radius:6px;line-height:1.5}

/* NAVIGATION */
.nav{display:flex;gap:10px;margin-top:1.25rem}
.btn-next{flex:1;padding:13px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;border-radius:10px;border:none;background:#0D3D6B;color:#fff;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.btn-next:hover{background:#185FA5}
.btn-next:disabled{background:#E8ECF2;color:#9BA8BB;cursor:not-allowed}
.btn-back{padding:13px 18px;font-family:'DM Mono',monospace;font-size:14px;border-radius:10px;border:1.5px solid #E8ECF2;background:#fff;color:#9BA8BB;cursor:pointer;transition:all .15s}
.btn-back:hover{border-color:#185FA5;color:#185FA5}

/* RESULTADO */
.result-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:1rem;animation:fadeUp .3s ease}
.result-hero{padding:1.5rem;color:#fff}
.result-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.result-perfil{font-family:'Fraunces',serif;font-size:30px;font-weight:600;letter-spacing:-.5px;margin-bottom:4px}
.result-desc{font-size:13px;opacity:.85;line-height:1.6;margin-top:8px}
.result-metrics{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1.5px solid #F4F6F9}
.rm{padding:.85rem 1rem;border-right:1.5px solid #F4F6F9;text-align:center}
.rm:last-child{border-right:none}
.rm-val{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:#0D3D6B}
.rm-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:#9BA8BB;margin-top:2px}

/* SAA BAR */
.saa-section{padding:1rem 1.25rem;border-bottom:1.5px solid #F4F6F9}
.saa-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#9BA8BB;margin-bottom:8px}
.saa-bar{height:28px;border-radius:8px;overflow:hidden;display:flex;margin-bottom:6px}
.saa-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff;transition:width .6s ease}
.saa-legend{display:flex;gap:14px;font-size:11px;color:#9BA8BB;flex-wrap:wrap}
.leg-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}

/* DATOS SECTION */
.datos-section{padding:1rem 1.25rem}
.datos-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F4F6F9;font-size:13px}
.datos-row:last-child{border-bottom:none}
.datos-lbl{color:#9BA8BB}
.datos-val{font-weight:500;color:#1A1A2E;text-align:right;max-width:200px}

/* ENVIO */
.envio-card{background:#fff;border-radius:14px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;margin-bottom:1rem}
.envio-icon{font-size:32px;margin-bottom:12px}
.envio-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:#0D3D6B;margin-bottom:6px}
.envio-desc{font-size:13px;color:#9BA8BB;line-height:1.6;margin-bottom:1.25rem}
.btn-enviar{width:100%;padding:14px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;border-radius:10px;border:none;background:#27500A;color:#fff;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-enviar:hover{background:#3B6D11}
.btn-enviar:disabled{background:#E8ECF2;color:#9BA8BB;cursor:not-allowed}
.status-msg{margin-top:10px;font-size:12px;padding:10px 14px;border-radius:8px;display:none}
.status-ok{background:#EAF3DE;color:#27500A;display:block}
.status-err{background:#FCEBEB;color:#791F1F;display:block}

.footer{text-align:center;font-size:11px;color:#9BA8BB;margin-top:1.5rem;line-height:1.7}

@media(max-width:480px){.fg2{grid-template-columns:1fr}.result-metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">NB Asesoría Financiera</div>
    <div class="header-sub">Nicolás Brunetti · CP · IOL invertironline · CNV</div>
  </div>
  <span class="header-badge">Cuestionario de perfil</span>
</div>

<div class="container">

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="prog-label">Módulo 1 de 5</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="step-dots" id="step-dots"></div>
  </div>

  <!-- ZONA PRINCIPAL -->
  <div id="main-zone"></div>

  <div class="footer">
    NB Asesoría Financiera · Nicolás Brunetti, CP<br>
    IOL invertironline · Regulado CNV · Confidencial
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURACIÓN — GOOGLE APPS SCRIPT WEBHOOK
// Reemplazar con tu URL de Google Apps Script
// ══════════════════════════════════════════════
const WEBHOOK_URL = https://script.google.com/macros/s/AKfycbzK2ig8SSubBHvaF-S04_IQEXi2T4x-cFnUak8bojLb6bAF9UI9D1hJqH-IkdjvNEYZzg/exec
  ;

// ══════════════════════════════════════════════
// STEPS
// ══════════════════════════════════════════════
const STEPS = [
  {
    id:'personal', title:'Datos personales', num:'Módulo 1 de 5',
    desc:'Necesitamos algunos datos básicos para armar tu perfil de inversión.',
    questions:[
      {id:'nombre',    type:'text',   label:'Nombre completo',    placeholder:'Ej: Juan García'},
      {id:'apellido',  type:'text',   label:'Apellido',           placeholder:'Ej: García'},
      {id:'email',     type:'email',  label:'Email de contacto',  placeholder:'juan@ejemplo.com'},
      {id:'edad',      type:'number', label:'Edad',               placeholder:'Ej: 35'},
      {id:'regimen',   type:'select', label:'Régimen tributario', opts:[
        {v:'',         l:'— Seleccioná —'},
        {v:'monotributo',  l:'Monotributista'},
        {v:'dependencia',  l:'Relación de dependencia'},
        {v:'autonomo',     l:'Autónomo / Régimen General'},
        {v:'empresa',      l:'Empresa / Sociedad'},
      ]},
    ]
  },
  {
    id:'objetivo', title:'Objetivo y horizonte', num:'Módulo 2 de 5',
    desc:'¿Qué querés lograr con tu inversión y en cuánto tiempo?',
    questions:[
      {id:'objetivo_prim', type:'opts', label:'¿Cuál es tu objetivo principal?', opts:[
        {v:'renta',        l:'Generar ingresos periódicos',           s:'Cobrar renta de forma regular'},
        {v:'crecimiento',  l:'Hacer crecer mi patrimonio',            s:'Multiplicar el capital a largo plazo'},
        {v:'mixto',        l:'Renta y crecimiento equilibrados',      s:'Lo mejor de ambos mundos'},
        {v:'preservacion', l:'Preservar el valor en dólares',         s:'Prioridad: no perder poder adquisitivo'},
      ]},
      {id:'horizonte', type:'opts', label:'¿En cuánto tiempo podrías necesitar este dinero?', opts:[
        {v:'<2',   l:'Menos de 2 años',   s:'Necesito acceso relativamente rápido'},
        {v:'2-5',  l:'2 a 5 años',        s:'Mediano plazo'},
        {v:'5-10', l:'5 a 10 años',       s:'Largo plazo — puedo esperar'},
        {v:'>10',  l:'Más de 10 años',    s:'Muy largo plazo — sin urgencia'},
      ]},
      {id:'capital', type:'opts', label:'¿Cuánto capital tenés disponible para invertir?', opts:[
        {v:'<10k',   l:'Menos de USD 10.000'},
        {v:'10-25k', l:'USD 10.000 – 25.000'},
        {v:'25-50k', l:'USD 25.000 – 50.000'},
        {v:'50-100k',l:'USD 50.000 – 100.000'},
        {v:'>100k',  l:'Más de USD 100.000'},
      ]},
      {id:'capital_exacto', type:'number', label:'Monto exacto a invertir inicialmente (USD)',
        placeholder:'Ej: 8500',
        hint:'Este monto se usa para calcular los importes exactos de cada posición en tu cartera. Es confidencial y solo lo ve tu asesor.'},
    ]
  },
  {
    id:'riesgo', title:'Tolerancia al riesgo', num:'Módulo 3 de 5',
    desc:'Respondé con honestidad — no hay respuestas correctas o incorrectas.',
    questions:[
      {id:'caida_mercado', type:'opts', label:'Si tu cartera cae un 20% en 3 meses, ¿qué harías?', opts:[
        {v:'vendo_todo',   l:'Vendo todo para evitar más pérdidas'},
        {v:'vendo_parte',  l:'Vendo una parte para reducir el riesgo'},
        {v:'espero',       l:'Espero tranquilo — los mercados fluctúan'},
        {v:'compro_mas',   l:'Compro más — veo una oportunidad'},
      ]},
      {id:'perdida_max', type:'opts', label:'¿Cuál es la pérdida anual máxima que podrías aceptar?', opts:[
        {v:'5',    l:'Hasta 5%',           s:'Muy conservador'},
        {v:'15',   l:'Hasta 15%',          s:'Conservador-moderado'},
        {v:'25',   l:'Hasta 25%',          s:'Moderado-agresivo'},
        {v:'mas',  l:'Más del 25%',        s:'Agresivo — si la tesis sigue en pie'},
      ]},
      {id:'experiencia', type:'opts', label:'¿Cuál es tu experiencia previa invirtiendo?', opts:[
        {v:'ninguna', l:'Ninguna — es mi primera vez'},
        {v:'basica',  l:'Básica — plazos fijos o fondos'},
        {v:'media',   l:'Media — acciones, CEDEARs, bonos'},
        {v:'alta',    l:'Alta — manejo una cartera activamente'},
      ]},
    ]
  },
  {
    id:'situacion', title:'Situación personal', num:'Módulo 4 de 5',
    desc:'Estos factores personales influyen en la estrategia recomendada.',
    questions:[
      {id:'dependientes', type:'opts', label:'¿Tenés personas que dependan económicamente de vos?', opts:[
        {v:'no',        l:'No — soy independiente'},
        {v:'si_parcial',l:'Sí, pero tengo ingresos estables que los cubren'},
        {v:'si_total',  l:'Sí, y este capital es parte de su sustento'},
      ]},
      {id:'fondo_emergencia', type:'opts', label:'¿Tenés un fondo de emergencia separado de esta inversión?', opts:[
        {v:'no',      l:'No — este capital es todo lo que tengo'},
        {v:'parcial', l:'Sí, pero es insuficiente (menos de 3 meses de gastos)'},
        {v:'si',      l:'Sí — tengo 3 a 6 meses de gastos cubiertos'},
        {v:'holgado', l:'Sí — tengo más de 6 meses bien cubiertos'},
      ]},
      {id:'restricciones', type:'opts', label:'¿Tenés alguna restricción o preferencia especial?', opts:[
        {v:'ninguna',        l:'Ninguna — total libertad de activos'},
        {v:'sin_riesgo_arg', l:'Prefiero evitar exposición a Argentina'},
        {v:'solo_usd',       l:'Solo quiero activos en dólares'},
        {v:'esg',            l:'Quiero criterios éticos / ESG'},
      ]},
    ]
  },
  {
    id:'fiscal', title:'Situación fiscal', num:'Módulo 5 de 5',
    desc:'Clave para maximizar el rendimiento neto después de impuestos.',
    questions:[
      {id:'bp_situacion', type:'opts',
        label:'¿Tu patrimonio total (inmuebles, autos, inversiones, cuentas) supera USD 100.000 equivalentes?',
        hint:'Este umbral corresponde al Mínimo No Imponible de Bienes Personales vigente para 2025.',
        opts:[
          {v:'no',    l:'No — estoy por debajo del umbral'},
          {v:'cerca', l:'Estoy cerca — puede variar al 31 de diciembre'},
          {v:'si',    l:'Sí — supero el umbral'},
          {v:'ns',    l:'No lo sé con certeza'},
        ]
      },
      {id:'objetivo_fiscal', type:'opts', label:'¿Qué tan importante es la optimización fiscal para vos?', opts:[
        {v:'poco',    l:'Poco importante — priorizo el rendimiento'},
        {v:'moderado',l:'Moderadamente importante — busco un balance'},
        {v:'mucho',   l:'Muy importante — tan relevante como el rendimiento'},
        {v:'critico', l:'Crítico — tengo una situación fiscal compleja'},
      ]},
    ]
  },
];

// ══════════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════════
const RISK_SCORES = {
  objetivo_prim:   {renta:1, crecimiento:4, mixto:3, preservacion:1},
  horizonte:       {'<2':1, '2-5':2, '5-10':3, '>10':4},
  caida_mercado:   {vendo_todo:1, vendo_parte:2, espero:3, compro_mas:4},
  perdida_max:     {'5':1, '15':2, '25':3, mas:4},
  experiencia:     {ninguna:1, basica:2, media:3, alta:4},
  dependientes:    {no:3, si_parcial:2, si_total:1},
  fondo_emergencia:{no:1, parcial:2, si:3, holgado:4},
};
const PROFILES = {
  conservador:          {name:'Conservador',          col:'#854F0B', bg:'#FAEEDA', rf:75, etfs:14, acc:11, beta:0.7,  bench:'4–5% USD anual'},
  moderado_conservador: {name:'Moderado Conservador', col:'#854F0B', bg:'#FAEEDA', rf:60, etfs:22, acc:18, beta:0.9,  bench:'5–6% USD anual'},
  moderado:             {name:'Moderado',             col:'#0C447C', bg:'#E6F1FB', rf:35, etfs:25, acc:40, beta:1.1,  bench:'6–8% USD anual'},
  moderado_agresivo:    {name:'Moderado Agresivo',    col:'#27500A', bg:'#EAF3DE', rf:13, etfs:30, acc:57, beta:1.3,  bench:'8–9% USD anual'},
  agresivo:             {name:'Agresivo',             col:'#27500A', bg:'#EAF3DE', rf:10, etfs:25, acc:65, beta:99,   bench:'9–11% USD anual'},
};

let ans = {}, step = 0;

function getProfile() {
  let tot = 0, cnt = 0;
  Object.keys(RISK_SCORES).forEach(k => {
    if (ans[k] !== undefined) { tot += RISK_SCORES[k][ans[k]] || 2; cnt++; }
  });
  const age = parseInt(ans.edad) || 35;
  const ageScore = age < 30 ? 4 : age < 40 ? 3 : age < 55 ? 2 : 1;
  tot += ageScore; cnt++;
  const avg = cnt > 0 ? tot / cnt : 2.5;
  if (avg < 1.7) return 'conservador';
  if (avg < 2.5) return 'moderado_conservador';
  if (avg < 3.2) return 'moderado';
  if (avg < 3.7) return 'moderado_agresivo';
  return 'agresivo';
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function updateProgress() {
  const pct = Math.round(step / STEPS.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = step < STEPS.length
    ? `Módulo ${step + 1} de ${STEPS.length}`
    : 'Completado';
  document.getElementById('step-dots').innerHTML = STEPS.map((_, i) =>
    `<div class="step-dot ${i < step ? 'done' : i === step ? 'active' : ''}"></div>`
  ).join('');
}

function renderStep() {
  if (step >= STEPS.length) { renderResult(); return; }
  const s = STEPS[step];
  let html = `<div class="step-card">
    <div class="step-num">${s.num}</div>
    <div class="step-title">${s.title}</div>
    <div class="step-desc">${s.desc}</div>`;

  s.questions.forEach(q => {
    if (q.type === 'opts') {
      html += `<div style="margin-bottom:1.25rem">
        <div class="q-label">${q.label}</div>
        ${q.hint ? `<div class="q-hint">ℹ️ ${q.hint}</div>` : ''}
        <div class="opts">
          ${q.opts.map(o => `
          <div class="opt${ans[q.id] === o.v ? ' sel' : ''}" onclick="selOpt('${q.id}','${o.v}',this)">
            <div class="opt-circle"></div>
            <div><div class="opt-main">${o.l}</div>${o.s ? `<div class="opt-sub">${o.s}</div>` : ''}</div>
          </div>`).join('')}
        </div>
      </div>`;
    } else if (q.type === 'select') {
      html += `<div class="field">
        <label>${q.label}</label>
        <select id="q-${q.id}" onchange="ans['${q.id}']=this.value;checkNav()">
          ${q.opts.map(o => `<option value="${o.v}" ${ans[q.id] === o.v ? 'selected' : ''}>${o.l}</option>`).join('')}
        </select>
      </div>`;
    } else {
      html += `<div class="field">
        <label>${q.label}</label>
        ${q.hint ? `<div class="q-hint">ℹ️ ${q.hint}</div>` : ''}
        <input type="${q.type}" id="q-${q.id}" placeholder="${q.placeholder || ''}"
          value="${ans[q.id] || ''}" oninput="ans['${q.id}']=this.value;checkNav()">
      </div>`;
    }
  });

  html += `</div>
  <div class="nav" id="nav-zone">
    ${step > 0 ? `<button class="btn-back" onclick="prevStep()">← Anterior</button>` : ''}
    <button class="btn-next" id="btn-next" onclick="nextStep()">
      ${step === STEPS.length - 1 ? 'Ver mi perfil →' : 'Continuar →'}
    </button>
  </div>`;

  document.getElementById('main-zone').innerHTML = html;
  checkNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selOpt(qid, val, el) {
  ans[qid] = val;
  el.closest('.opts').querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  checkNav();
}

function checkNav() {
  const s = STEPS[step];
  const btn = document.getElementById('btn-next');
  if (!btn) return;
  const OPTIONAL = ['capital_exacto'];
  const ok = s.questions.every(q => {
    if (OPTIONAL.includes(q.id)) return true;
    const v = ans[q.id];
    return v !== undefined && v !== '' && v !== null;
  });
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '0.4';
}

function nextStep() { step++; updateProgress(); renderStep(); }
function prevStep() { step--; updateProgress(); renderStep(); }

// ══════════════════════════════════════════════
// RESULTADO
// ══════════════════════════════════════════════
function renderResult() {
  const pk = getProfile();
  const P = PROFILES[pk];
  const edad = parseInt(ans.edad) || 35;

// ENVÍO — Google Apps Script Webhook
// ══════════════════════════════════════════════
function enviarResultado(pk, rf, etfs, acc) {
  const btn = document.getElementById('btn-enviar');
  const msg = document.getElementById('status-msg');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Enviando...';

  const REGIMEN_MAP = {
    monotributo: 'Monotributista', dependencia: 'Relación de dependencia',
    autonomo: 'Autónomo / Reg. General', empresa: 'Empresa / Sociedad'
  };
  const OBJ_MAP = {
    renta: 'Generar renta', crecimiento: 'Crecimiento patrimonial',
    mixto: 'Renta y crecimiento', preservacion: 'Preservación de capital'
  };
  const HOR_MAP = {'<2':'Menos de 2 años','2-5':'2 a 5 años','5-10':'5 a 10 años','>10':'Más de 10 años'};
  const PERDIDA_MAP = {'5':'Hasta 5%','15':'Hasta 15%','25':'Hasta 25%',mas:'Más del 25%'};
  const CAPITAL_MAP = {
    '<10k':'Menos de USD 10.000','10-25k':'USD 10.000–25.000',
    '25-50k':'USD 25.000–50.000','50-100k':'USD 50.000–100.000','>100k':'Más de USD 100.000'
  };

  const payload = {
    fecha: new Date().toLocaleString('es-AR'),
    nombre: `${ans.nombre || ''} ${ans.apellido || ''}`.trim(),
    email: ans.email || '',
    edad: ans.edad || '',
    regimen: REGIMEN_MAP[ans.regimen] || ans.regimen || '',
    capital: CAPITAL_MAP[ans.capital] || ans.capital || '',
    capital_exacto: ans.capital_exacto || '',
    perfil: PROFILES[pk].name,
    objetivo: OBJ_MAP[ans.objetivo_prim] || '',
    horizonte: HOR_MAP[ans.horizonte] || '',
    tolerancia_perdida: PERDIDA_MAP[ans.perdida_max] || '',
    experiencia: ans.experiencia || '',
    dependientes: ans.dependientes || '',
    fondo_emergencia: ans.fondo_emergencia || '',
    restricciones: ans.restricciones || '',
    bp_situacion: ans.bp_situacion || '',
    objetivo_fiscal: ans.objetivo_fiscal || '',
    saa_etfs: etfs,
    saa_acciones: acc,
    saa_rf: rf,
    beta_max: PROFILES[pk].beta === 99 ? 'Libre' : PROFILES[pk].beta,
    benchmark: PROFILES[pk].bench,
  };

  fetch(WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    btn.innerHTML = '<span>✓</span> ¡Enviado correctamente!';
    btn.style.background = '#27500A';
    msg.className = 'status-msg status-ok';
    msg.textContent = '✓ Perfil enviado a Nicolás Brunetti. Te contactará a la brevedad para comenzar con tu estrategia personalizada.';
  })
  .catch(() => {
    btn.disabled = false;
    btn.innerHTML = '<span>📨</span> Reintentar envío';
    msg.className = 'status-msg status-err';
    msg.textContent = '⚠ No se pudo enviar. Por favor escribile directamente a Nicolás.';
  });
}

updateProgress();
renderStep();
</script>
